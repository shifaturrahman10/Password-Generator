<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Password Generator</h1>

  <input type="number" id="length" placeholder="Password length - 4/8/12/16">
    
  <div class="options">
  <label><input type="checkbox" id="upper" checked> Uppercase</label>
  <label><input type="checkbox" id="lower" checked> Lowercase</label>
  <label><input type="checkbox" id="numbers" checked> Numbers</label>
  <label><input type="checkbox" id="symbols" checked> Symbols</label>
</div>

    <button onclick="generatePassword()">Generate Password</button>

    <p id="result">Your password will appear here</p>
    <button onclick="copyPassword()">Copy Password</button>
  </div>

  <script src="script.js"></script>
   <footer>
  <p>Made by Shifatur Rahman 😎</p>
   </footer>
</body>
</html>
